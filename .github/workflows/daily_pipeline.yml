name: Daily Trading Pipeline

on:
  schedule:
    # Run Mon-Fri at 07:00 UTC (London open, tighter spreads) — 3:00 PM Shanghai
    - cron: "0 7 * * 1-5"
  workflow_dispatch: # Allow manual trigger

jobs:
  pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.BOT_GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements-pipeline.txt

      - name: Restore pipeline DB
        uses: actions/cache@v4
        with:
          path: data/pipeline.db
          key: pipeline-db-v62-${{ github.run_number }}
          restore-keys: |
            pipeline-db-v62-

      - name: API health check with fallback
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CAPITAL_API_KEY: ${{ secrets.CAPITAL_API_KEY }}
          CAPITAL_EMAIL: ${{ secrets.CAPITAL_EMAIL }}
          CAPITAL_PASSWORD: ${{ secrets.CAPITAL_PASSWORD }}
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python3 -m pipeline.agents.api_health --json --fallback > /tmp/api_health.json
          python3 -c "
          import json, os, urllib.request

          with open('/tmp/api_health.json') as f:
              results = json.load(f)

          # Check for critical broker failures and send explicit Telegram alerts
          broker_alerts = []
          for r in results:
              if r.get('name') == 'Alpaca' and r.get('status') in ('error', 'no_key'):
                  broker_alerts.append(f\"Alpaca broker DOWN: {r.get('message', 'unknown error')}\")
              if r.get('name') == 'Capital.com' and r.get('status') in ('error', 'no_key'):
                  broker_alerts.append(f\"Capital.com broker DOWN: {r.get('message', 'unknown error')}\")

          if broker_alerts:
              token = os.environ.get('TELEGRAM_BOT_TOKEN')
              chat_id = os.environ.get('TELEGRAM_CHAT_ID')
              if token and chat_id:
                  msg = '<b>Broker Health Alert</b>\n\n' + '\n'.join(f'  - {a}' for a in broker_alerts)
                  data = json.dumps({'chat_id': chat_id, 'text': msg, 'parse_mode': 'HTML'}).encode()
                  req = urllib.request.Request(
                      f'https://api.telegram.org/bot{token}/sendMessage',
                      data=data,
                      headers={'Content-Type': 'application/json'},
                  )
                  try:
                      urllib.request.urlopen(req, timeout=10)
                      print(f'Broker health alert sent: {broker_alerts}')
                  except Exception as e:
                      print(f'Failed to send broker alert: {e}')
              else:
                  print(f'BROKER ALERT (no Telegram): {broker_alerts}')
          "

      - name: Run FX daily pipeline
        env:
          CAPITAL_API_KEY: ${{ secrets.CAPITAL_API_KEY }}
          CAPITAL_EMAIL: ${{ secrets.CAPITAL_EMAIL }}
          CAPITAL_PASSWORD: ${{ secrets.CAPITAL_PASSWORD }}
          CAPITAL_ENV: "demo"
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python3 -m pipeline.agents.fx_pipeline --daily

      - name: Clean ghost trades (no broker_order_id, post-reconciliation)
        run: |
          python3 -c "
          import sqlite3, os
          db = 'data/pipeline.db'
          if os.path.exists(db):
              conn = sqlite3.connect(db)
              cur = conn.execute(\"UPDATE paper_trades SET status='ghost', pnl=NULL WHERE broker_order_id IS NULL AND status IN ('open', 'pending')\")
              if cur.rowcount > 0:
                  print(f'Flagged {cur.rowcount} ghost trades (no broker confirmation)')
              conn.commit()
              conn.close()
          "

      - name: Persist pipeline DB to shared/
        if: always()
        run: |
          mkdir -p shared
          cp data/pipeline.db shared/pipeline.db 2>/dev/null && echo "Copied pipeline.db to shared/" || echo "No pipeline.db to copy"

      - name: Update bot status
        if: always()
        run: |
          python3 -c "
          import json
          from datetime import datetime, timezone, timedelta
          SHANGHAI_TZ = timezone(timedelta(hours=8))
          now = datetime.now(SHANGHAI_TZ).isoformat()

          status = {}
          try:
              status = json.load(open('shared/bot_status.json'))
          except:
              pass

          status['fx_bot'] = {
              'last_run': now,
              'status': 'ok',
              'next_run': 'next weekday 07:00 UTC (3:00 PM Shanghai)'
          }

          import os
          os.makedirs('shared', exist_ok=True)
          json.dump(status, open('shared/bot_status.json', 'w'), indent=2)
          print(f'FX bot status updated')
          "

      - name: Run performance monitor
        continue-on-error: true
        run: python3 -m pipeline.agents.performance_monitor

      - name: Cross-bot risk check
        env:
          GH_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN }}
          STOCK_REPO: ${{ vars.STOCK_REPO || 'souhail123456/trading-bot' }}
          POLYMARKET_REPO: ${{ vars.POLYMARKET_REPO || 'souhail123456/polymarket-bot' }}
        run: python3 -m pipeline.agents.cross_bot_risk

      - name: Export FX trades
        run: python3 src/export_fx_trades.py

      - name: Update unified history
        env:
          GH_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN }}
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          POLYMARKET_REPO: ${{ vars.POLYMARKET_REPO || 'souhail123456/polymarket-bot' }}
        run: python3 src/unified_history.py

      - name: Commit shared state
        run: |
          git config user.name "trading-admin[bot]"
          git config user.email "bot@trading-admin"
          git add -f shared/global_state.json shared/bot_status.json shared/daily_history.jsonl shared/fx_trades.jsonl shared/pipeline.db
          git diff --cached --quiet && echo "No shared state changes" && exit 0
          git commit -m "Update shared state $(date -u +%Y-%m-%d)"
          git push

      - name: Save pipeline DB
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/pipeline.db
          key: pipeline-db-v62-${{ github.run_number }}
