name: Daily Trading Pipeline

on:
  schedule:
    # Run Mon-Fri at 21:30 UTC (after US market close, 30min after report) — 5:30 AM+1 Shanghai
    - cron: "30 21 * * 1-5"
  workflow_dispatch: # Allow manual trigger

jobs:
  pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.BOT_GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements-pipeline.txt

      - name: Restore pipeline DB
        uses: actions/cache@v4
        with:
          path: data/pipeline.db
          key: pipeline-db-${{ github.run_number }}
          restore-keys: |
            pipeline-db-

      - name: Clean ghost trades (no broker_order_id)
        run: |
          python3 -c "
          import sqlite3, os
          db = 'data/pipeline.db'
          if os.path.exists(db):
              conn = sqlite3.connect(db)
              cur = conn.execute(\"UPDATE paper_trades SET status='closed', closed_at=datetime('now'), pnl=0 WHERE broker_order_id IS NULL AND status='open' AND strategy_id IN (100, 101)\")
              if cur.rowcount > 0:
                  print(f'Cleaned {cur.rowcount} ghost FX trades (no broker confirmation)')
              conn.commit()
              conn.close()
          "

      - name: API health check with fallback
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CAPITAL_API_KEY: ${{ secrets.CAPITAL_API_KEY }}
          CAPITAL_EMAIL: ${{ secrets.CAPITAL_EMAIL }}
          CAPITAL_PASSWORD: ${{ secrets.CAPITAL_PASSWORD }}
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python3 -m pipeline.agents.api_health --json --fallback > /tmp/api_health.json

      - name: Run FX daily pipeline
        env:
          CAPITAL_API_KEY: ${{ secrets.CAPITAL_API_KEY }}
          CAPITAL_EMAIL: ${{ secrets.CAPITAL_EMAIL }}
          CAPITAL_PASSWORD: ${{ secrets.CAPITAL_PASSWORD }}
          CAPITAL_ENV: "demo"
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python3 -m pipeline.agents.fx_pipeline --daily

      - name: Update bot status
        if: always()
        run: |
          python3 -c "
          import json
          from datetime import datetime, timezone, timedelta
          SHANGHAI_TZ = timezone(timedelta(hours=8))
          now = datetime.now(SHANGHAI_TZ).isoformat()

          status = {}
          try:
              status = json.load(open('shared/bot_status.json'))
          except:
              pass

          status['fx_bot'] = {
              'last_run': now,
              'status': 'ok',
              'next_run': 'next weekday 21:30 UTC (5:30 AM Shanghai)'
          }

          import os
          os.makedirs('shared', exist_ok=True)
          json.dump(status, open('shared/bot_status.json', 'w'), indent=2)
          print(f'FX bot status updated')
          "

      - name: Run performance monitor
        continue-on-error: true
        run: python3 -m pipeline.agents.performance_monitor

      - name: Cross-bot risk check
        env:
          GH_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN }}
          STOCK_REPO: ${{ vars.STOCK_REPO || 'souhail123456/trading-bot' }}
          POLYMARKET_REPO: ${{ vars.POLYMARKET_REPO || 'souhail123456/polymarket-bot' }}
        run: python3 -m pipeline.agents.cross_bot_risk

      - name: Commit shared state
        run: |
          git config user.name "trading-admin[bot]"
          git config user.email "bot@trading-admin"
          git add shared/global_state.json shared/bot_status.json
          git diff --cached --quiet && echo "No shared state changes" && exit 0
          git commit -m "Update shared state $(date -u +%Y-%m-%d)"
          git push

      - name: Save pipeline DB
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/pipeline.db
          key: pipeline-db-${{ github.run_number }}
