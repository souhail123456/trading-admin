name: Daily Trading Pipeline

on:
  schedule:
    # Run Mon-Fri at 21:30 UTC (after US market close, 30min after report)
    - cron: "30 21 * * 1-5"
  workflow_dispatch: # Allow manual trigger

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements-pipeline.txt

      - name: Restore pipeline DB
        uses: actions/cache@v4
        with:
          path: data/pipeline.db
          key: pipeline-db-${{ github.run_number }}
          restore-keys: |
            pipeline-db-

      - name: Run FX daily pipeline
        env:
          CAPITAL_API_KEY: ${{ secrets.CAPITAL_API_KEY }}
          CAPITAL_EMAIL: ${{ secrets.CAPITAL_EMAIL }}
          CAPITAL_PASSWORD: ${{ secrets.CAPITAL_PASSWORD }}
          CAPITAL_ENV: "demo"
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python3 -m pipeline.agents.fx_pipeline --daily

      - name: Cross-bot risk check
        env:
          GH_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN }}
          STOCK_REPO: ${{ vars.STOCK_REPO || 'souhail123456/trading-bot' }}
          POLYMARKET_REPO: ${{ vars.POLYMARKET_REPO || 'souhail123456/polymarket-bot' }}
        run: python3 -m pipeline.agents.cross_bot_risk

      - name: Commit shared state
        run: |
          git config user.name "trading-admin[bot]"
          git config user.email "bot@trading-admin"
          git add shared/global_state.json
          git diff --cached --quiet && echo "No shared state changes" && exit 0
          git commit -m "Update shared state $(date -u +%Y-%m-%d)"
          git push

      - name: Save pipeline DB
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/pipeline.db
          key: pipeline-db-${{ github.run_number }}
